services:
  app:
    build:
      context: .
    env_file:
      - ./src/.env
    ports:
      - "80:8080"
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/ping"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 10s

  db:
    image: postgres:15
    env_file:
      - ./src/.env
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-postgres}\" -d \"$${POSTGRES_DB:-postgres}\" -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
